schema_version: marketing-review-standards/v2
name: financial-marketing-content-standards
# v2 (2026-06-07): 기존 6룰에 실제 법조문(law_name/article_no) 매핑 + 누락 고위험 위반 7종 추가
# (계좌비밀번호 수집·과잉대출 조장·정부 공신력 사칭·한도 무제한·긴박감 조성·과도 금전유인·개인이메일 수집)
forbidden_expressions:
  - id: GUARANTEED_PRINCIPAL
    severity: HIGH
    patterns: ["원금 보장", "원금보장", "元本保証", "principal guaranteed", "guaranteed principal", "principal protected", "no loss of principal"]
    law_name: "금융소비자보호법"
    article_no: "제22조(허위·과장 광고 금지)"
    rationale: "원금 보장 표현은 금융상품 성격에 따라 소비자 오인을 유발할 수 있습니다."
    suggested_revision: "예금자보호 여부, 보호 한도, 상품 조건을 명확히 고지하세요."
    suggested_revision_en: "State whether the product is covered by depositor protection, the coverage limit, and the product conditions clearly."
  - id: ZERO_RISK
    severity: HIGH
    patterns: ["무위험", "원금 손실 걱정 전혀 없", "원금 손실 걱정 없", "zero risk", "零风险", "không rủi ro", "リスクなし", "tanpa risiko"]
    law_name: "금융소비자보호법"
    article_no: "제22조(허위·과장 광고 금지)"
    rationale: "무위험·원금 손실 없음 표현은 투자·대출·예금 광고에서 리스크를 축소·오인하게 합니다."
    suggested_revision: "상품 조건과 손실/변동 가능성 또는 심사 조건을 함께 안내하세요."
    suggested_revision_en: "Present the product conditions together with the possibility of loss/variability or the review conditions."
  - id: GUARANTEED_RETURN
    severity: HIGH
    patterns: ["확정 수익", "확정수익", "확정 보장", "guaranteed", "guaranteed return", "guaranteed profit", "保证收益", "lợi nhuận chắc chắn", "必ず利益", "untung pasti"]
    law_name: "금융소비자보호법"
    article_no: "제22조(허위·과장 광고 금지)"
    rationale: "수익·금리 확정·보장 표현은 금융광고에서 과장 또는 오인 소지가 큽니다."
    suggested_revision: "조건 충족 시 가능한 혜택과 변동/제한 조건을 분리해 표시하세요."
    suggested_revision_en: "Separately state the benefits available when conditions are met and the applicable variability/limitation conditions."
  - id: EVERYONE_BEST_RATE
    severity: MEDIUM
    patterns: ["누구나", "모든 고객", "직업과 관계없이", "직업 관계없이", "everyone", "所有客户", "ai cũng", "全員", "semua nasabah"]
    law_name: "금융소비자보호법"
    article_no: "제22조(허위·과장 광고 금지)"
    rationale: "모든 고객 대상 표현은 실제 우대조건·심사조건과 충돌할 수 있습니다."
    suggested_revision: "대상 조건, 가입 한도, 심사 기준을 명확히 고지하세요."
    suggested_revision_en: "Clearly disclose the eligibility conditions, enrollment limits, and review criteria."
  - id: GUARANTEED_APPROVAL
    severity: CRITICAL
    patterns: ["100% 승인", "100% 대출", "100% 가입 승인", "100%가입승인", "100% 가입", "무조건 승인", "무조건 가입 승인", "즉시 승인", "신용점수 상관없이", "신용등급 상관없이", "심사 없음", "심사없이", "심사 절차는 전부 생략", "심사 절차를 전부 생략", "심사 절차 전부 생략", "묻지도 따지지도 않고", "단 한 분도 거절", "거절되지 않습니다", "everyone approved", "langsung disetujui", "được duyệt vay"]
    law_name: "금융소비자보호법"
    article_no: "제21조(부당권유행위 금지)·제22조"
    rationale: "대출 승인 보장·심사 생략 표현은 여신심사 의무를 무력화하고 소비자를 오인하게 하는 고위험 표현입니다."
    suggested_revision: "심사 결과에 따라 승인 여부·한도·금리가 달라질 수 있음을 명시하세요."
    suggested_revision_en: "State that approval, credit limit, and interest rate may vary depending on the review result."
  - id: LOWEST_RATE_GUARANTEE
    severity: HIGH
    patterns: ["최저금리 보장", "최저 금리 보장", "최저금리보장", "업계 최저", "업계 최저금리", "업계 최저 금리", "가장 저렴", "무조건 더 저렴", "최고 금리 보장", "최고금리 보장", "최고금리보장", "lowest rate guaranteed", "best rate guaranteed", "保证最低利率"]
    law_name: "표시·광고의 공정화에 관한 법률"
    article_no: "제3조(부당한 비교광고)"
    rationale: "최저/최고·업계 최저 등 객관적 근거 없는 최상급·비교 표현은 소비자 오인을 유발합니다."
    suggested_revision: "적용 금리는 시장 상황·심사 결과에 따라 달라질 수 있으며 객관적 근거를 함께 제시하세요."
    suggested_revision_en: "State that the applied rate may vary with market conditions and review results, and provide objective supporting evidence."
  # ───────── v2 신규: 고위험 위반 7종 ─────────
  - id: ACCOUNT_CREDENTIAL_COLLECTION
    severity: CRITICAL
    patterns: ["계좌 비밀번호", "계좌비밀번호", "보안카드 번호", "보안카드번호", "OTP 번호", "비밀번호를 담당", "비밀번호를 입력", "비밀번호를 보내", "공인인증서 비밀번호"]
    law_name: "개인정보보호법"
    article_no: "제23조(민감정보)·제16조(최소수집)"
    rationale: "계좌 비밀번호·보안카드 등 금융거래 비밀번호 수집은 대출 심사에 불필요한 과도 수집이며, 금융기관은 이를 절대 요구하지 않습니다. 피싱·금융사고 직결 최악 리스크입니다."
    suggested_revision: "비밀번호·보안카드 번호 요구를 즉시 삭제하고, 공식 채널의 본인확인 절차만 안내하세요."
  - id: PERSONAL_CHANNEL_PII_COLLECTION
    severity: CRITICAL
    patterns: ["개인 이메일", "gmail.com", "naver.com으로 보내", "메일로 보내주시", "메일로 보내주시면", "신분증 사본과", "신분증 사본을", "이메일로 보내주시"]
    law_name: "개인정보보호법"
    article_no: "제15조·제16조(수집 동의·최소수집)"
    rationale: "신분증 사본 등 개인정보를 개인 이메일 등 비공식 채널로 수집하는 것은 수집 동의·목적·최소수집 원칙 위반이며 유출 위험이 큽니다."
    suggested_revision: "개인정보는 공식 홈페이지·앱의 보안 채널에서 수집·이용 목적, 항목, 보유기간, 동의 거부권을 고지한 뒤 수집하세요."
  - id: OVERLENDING_INDUCEMENT
    severity: CRITICAL
    patterns: ["갚지 못해도", "갚지 못하셔도", "갚지 않아도", "최대한 많이 빌리", "많이 빌리세요", "불이익 전혀 없", "불이익도 전혀 없", "어떠한 불이익도", "연체 이력이 있으셔도", "연체 이력이 있어도"]
    law_name: "금융소비자보호법"
    article_no: "제21조(부당권유행위 금지)"
    rationale: "채무 불이행 시 불이익이 없다는 허위 안내와 과도한 차입 권유는 과잉대출을 조장하는 부당권유행위입니다. 단독으로도 반려 사유입니다."
    suggested_revision: "과도한 대출은 신용점수 하락·연체 시 불이익을 초래할 수 있음을 명확히 고지하세요."
  - id: FAKE_PUBLIC_AUTHORITY
    severity: CRITICAL
    patterns: ["정부 공식 인증", "정부지원 특별", "정부 지원 특별", "정부지원 자금", "공식 인증을 받은", "100% 합법", "절대로 손해 보지 않", "절대 손해 보지 않", "유일무이"]
    law_name: "표시·광고의 공정화에 관한 법률"
    article_no: "제3조(허위·기만 광고)"
    rationale: "근거 없는 정부 인증·정부지원·합법 보증 표현은 공신력 사칭이자 허위·과장 광고입니다."
    suggested_revision: "실제 인증·승인 근거가 없으면 해당 표현을 삭제하고, 증빙 가능한 사실만 기재하세요."
  - id: UNLIMITED_LIMIT
    severity: HIGH
    patterns: ["한도 무제한", "한도를 무제한", "무제한으로 제공", "무제한으로 즉시", "한도 무제한으로", "한도를 무제한으로"]
    law_name: "금융소비자보호법"
    article_no: "제22조(허위·과장 광고 금지)"
    rationale: "대출 한도는 상품·고객별 심사 결과에 따라 제한되므로 '무제한' 표현은 사용할 수 없습니다."
    suggested_revision: "한도는 심사 결과에 따라 다르며 최대 한도 범위를 사실대로 표시하세요."
  - id: EXCESSIVE_MONETARY_INDUCEMENT
    severity: HIGH
    patterns: ["조건 없이 즉시 지급", "아무 조건 없이", "현금 50만원", "현금 100만원", "즉시 지급", "추천하시면 추가로", "사실상 공짜", "공짜로 돈을"]
    law_name: "금융소비자보호법 시행령"
    article_no: "제16조(부당한 재산상 이익 제공)"
    rationale: "조건·대상·기간 없이 과도한 금전을 제공하는 표현은 부당한 재산상 이익 제공·과잉 유인입니다."
    suggested_revision: "혜택의 조건, 대상, 지급 제한, 기간을 명확히 고지하세요."
  - id: URGENCY_PRESSURE
    severity: MEDIUM
    patterns: ["오늘 자정까지", "오늘 자정까지만", "지금 바로 서둘러", "서둘러 신청", "평생 후회", "놓치면 평생", "망설이지 말고", "limited time offer", "limited-time offer", "limited time only", "act now", "last chance", "hurry", "don't miss out", "dont miss out", "ends tonight", "ends today", "only today", "before it's gone", "before its gone"]
    law_name: "금융소비자보호법"
    article_no: "제21조(부당권유행위 금지)"
    rationale: "긴박감·공포를 조성해 숙려를 방해하는 압박형 표현은 부당권유 소지가 있습니다."
    suggested_revision: "충분한 정보 제공 후 소비자가 숙고하여 선택할 수 있도록 압박 표현을 제거하세요."
    suggested_revision_en: "Remove urgency/pressure language so the consumer can decide after sufficient information and deliberation."
  # 다크패턴(소비자활동알림/감정적압박)은 부분문자열 오탐 방지를 위해
  # marketing_reviewer.add_dark_pattern_findings()에서 정규식+negative lookahead로 처리.
required_disclosures:
  deposit:
    - 우대금리 조건
    - 가입 한도
    - 세전/세후 여부
    - 중도해지 조건
  loan:
    - 심사 조건
    - 금리 범위
    - 상환 조건
    - 신용도 영향
    - 연체이자율
  investment:
    - 원금 손실 가능성
    - 수수료
    - 과거 수익률이 미래 수익을 보장하지 않음
  card:
    - 전월 실적 조건
    - 혜택 한도
    - 행사 기간
  insurance:
    - 납입기간
    - 해지환급금
    - 갱신
    - 면책
    - 청약철회
channels:
  app_push:
    max_recommended_length: 90
    must_include_link_to_terms: true
  sns:
    must_include_hashtag_review: true
