schema_version: workflow/v1
name: financial-marketing-content-review
purpose: 금융 마케팅 콘텐츠 초안을 다국어·다채널 기준으로 심의하고 수정안과 승인 workflow payload를 생성한다.

nodes:
  - id: content_intake
    type: input
    output: normalized_content
  - id: pii_guard
    type: security
    output: redacted_content
  - id: detect_language
    type: classifier
    output: language
  - id: classify_content
    type: classifier
    output: channel, content_type, product_type
  - id: load_review_standards
    type: retrieval
    output: review_standards
  - id: rule_based_review
    type: deterministic_checker
    output: findings
  - id: llm_advisory_board
    type: optional_llm
    output: llm_calls
  - id: generate_revisions
    type: revision_generator
    output: revision_suggestions
  - id: independent_validation
    type: critic
    output: cross_model_result
  - id: approval_decision
    type: decision
    output: approval_status
  - id: publish_workflow_mock
    type: action_mock
    output: slack_payload, notion_payload
  - id: audit_log
    type: audit
    output: audit_log_id

routing:
  critical_if:
    - severity == CRITICAL
    - approval_status in [REJECTED, HUMAN_REVIEW_REQUIRED]
  human_review_if:
    - confidence in [PARTIAL, FAILED]
    - high_or_critical_findings > 0
    - multilingual_content == true

model_policy:
  classifier: gpt-5.4-nano
  board: gpt-5.4-mini
  revision_writer: gpt-5.4-mini
  critical_revision_writer: gpt-5.5 none
  critic: gpt-5.5 none
  real_llm_enabled_only_when: CS_ENABLE_LLM_RUNTIME=1

outputs:
  - final_report
  - workflow_exports
  - audit_log_id
  - evaluation_metadata
