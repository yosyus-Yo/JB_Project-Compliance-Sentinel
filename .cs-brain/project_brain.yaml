- id: LP-CS-040
  context: 한국어 PII 마스킹 회귀 — 한글 인접 어미
  status: SUCCESS_PATTERN
  content: 'Python 정규식 \b 워드 경계는 한글 인접 시 풀리지 않음 (\w가 한글 포함).

    pii.py에서 lookaround `(?<![\w@.+\-])` + `(?![\w@.+\-])` 사용으로 해결.

    ''010-1234-5678로'', ''user@example.com으로'', ''900101-1234567과'' 등 모두 마스킹.

    '
  learned_at: '2026-05-13T00:00:00Z'
